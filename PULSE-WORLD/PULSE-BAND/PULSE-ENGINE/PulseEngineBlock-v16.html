<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width,
                 initial-scale=1,
                 maximum-scale=1,
                 minimum-scale=1,
                 user-scalable=no">

  <title>Pulse Motion Engine Block — v16-IMMORTAL</title>

  <!-- ============================================================================
       PULSE UI SKIN ORGAN (BASE)
       ============================================================================ -->
  <link rel="stylesheet" href="./PulseEvolutionaryStyles.css" />

  <!-- ============================================================================
       PULSE UI ANIMATION ORGAN (MOTION)
       ============================================================================ -->
  <link rel="stylesheet" href="./PulseEvolutionaryAnimations.css" />

  <!-- ============================================================================
       DYNAMIC CSS LAYER (EVOLUTION INJECTION)
       ============================================================================ -->
  <style id="evo-dynamic-style"></style>
</head>

<body>
  <!-- ============================================================================
       HTML LAYER (SKELETON)
       ----------------------------------------------------------------------------
       MotionPage-v16 Skeleton
       --------------------------------
       This wrapper reconstructs into:
         • ForwardMotion
         • BackwardMotion
         • Any future motion lane
       ============================================================================ -->
  <div id="motion-wrapper"></div>

  <!-- ============================================================================
       JS LAYER (CORTEX)
       ============================================================================ -->
<script type="module">
/* ============================================================================
   AI_EXPERIENCE_META — MotionPage-v16
   ----------------------------------------------------------------------------
   This page is a universal motion shell. It does NOT contain motion logic.
   It loads:
     • PulseMotionEngine-v16 (unified engine)
     • ForwardMotion-v16.js OR BackwardMotion-v16.js (lane wrapper)
     • UI organism organs (Memory, Code, Brain, Router, Impulse, Binary)
   ============================================================================ */
const AI_EXPERIENCE_META = {
  identity: "MotionPage",
  version: "v16-IMMORTAL",
  layer: "motion_shell",
  role: "motion_page_bootstrap",
  evo: {
    unifiedMotion: true,
    laneAgnostic: true,
    driftProof: true,
    zeroCompute: true,
    zeroMutation: true,
    pureBootstrap: true,
    presenceAware: true,
    advantageAware: true,
    triHeartAware: true
  }
};

/* ============================================================================
   0. BOOT MEMBRANE — MUST BE FIRST
   ============================================================================ */
import * as PulseWindow from "../../PULSE-UI/PulseWorldPortal-v16.js";

/* ============================================================================
   1. SKIN REFLEX — AUTO-ATTACHES
   ============================================================================ */
import * as PulseSkinReflex from "../../PULSE-UI/PulseUISkinReflex.js";

/* ============================================================================
   2. ICONS
   ============================================================================ */
import { PulseIcons } from "../../PULSE-UI/PulseEvolutionaryIcons.js";

/* ============================================================================
   3. UI ORGANISM ORGANS
   ============================================================================ */
import { createPulseEvolutionaryCode } from "../../PULSE-UI/PulseEvolutionaryCode.js";
import { createPulseEvolutionaryMemory } from "../../PULSE-UI/PulseEvolutionaryMemory.js";
import { createPulseEvolutionaryBrain } from "../../PULSE-UI/PulseEvolutionaryBrain.js";
import { createPulseEvolutionaryImpulse } from "../../PULSE-UI/PulseEvolutionaryImpulse.js";
import { createPulseEvolutionaryRouter } from "../../PULSE-UI/PulseEvolutionaryRouter.js";
import { createPulseEvolutionaryBinary } from "../../PULSE-UI/PulseEvolutionaryBinary.js";

/* ============================================================================
   4. MOTION WRAPPER (choose lane)
   ----------------------------------------------------------------------------
   Swap this import to:
     • "./ForwardMotion-v16.js"
     • "./BackwardMotion-v16.js"
   ============================================================================ */
import * as Motion from "./BackwardMotion-v16.js";

/* ============================================================================
   5. MOCK CNS (replace with real CNS when wired)
   ============================================================================ */
const CNS = {
  emitImpulse(source, impulse) {
    console.log("[CNS] Impulse:", source, impulse);
  }
};

/* ============================================================================
   6. EVOLUTION MODEL
   ============================================================================ */
const Evolution = {
  getPageLineage() {
    return {
      lineage: "v16-motion",
      stable: true,
      page: window.location.pathname
    };
  },
  recordPageLineage(model) {
    console.log("[Evolution] Lineage recorded:", model);
  }
};

/* ============================================================================
   7. INSTANTIATE UI ORGANS — v16 IMMORTAL ORDER
   ============================================================================ */
const MemoryOrgan = createPulseEvolutionaryMemory({
  routeId: window.location.pathname || "MotionPage"
});

const CodeOrgan = createPulseEvolutionaryCode({
  Evolution,
  LongTermMemory: MemoryOrgan,
  CNS
});

const BrainOrgan = createPulseEvolutionaryBrain({
  Evolution,
  LongTermMemory: MemoryOrgan,
  CNS,
  createCode: () => CodeOrgan,
  createMemory: () => MemoryOrgan
});

const RouterOrgan = createPulseEvolutionaryRouter({
  CNS,
  Evolution,
  CodeOrgan,
  BrainOrgan
});

const ImpulseOrgan = createPulseEvolutionaryImpulse({
  CNS,
  Evolution,
  RouteOrgan: RouterOrgan
});

const BinaryOrgan = createPulseEvolutionaryBinary({
  Evolution,
  RouteOrgan: RouterOrgan,
  MemoryOrgan
});

/* ============================================================================
   8. PREWARM — v16 IMMORTAL
   ============================================================================ */
async function prewarmMotionMembrane() {
  try {
    await MemoryOrgan.prewarm?.();
    await BinaryOrgan.prewarm?.();
    await BrainOrgan.prewarm?.();
    await Motion.prewarm?.();

    console.log("[PREWARM] Motion membrane prewarmed.");
  } catch (err) {
    console.warn("[PREWARM] Motion membrane prewarm failed:", err);
  }
}

/* ============================================================================
   9. BACKGROUND MOTION TICK
   ============================================================================ */
async function runMotionTick() {
  const res = Motion.tick?.();
  if (res?.metrics) {
    console.log("[MOTION-TICK]", res.metrics);
  }
}

/* ============================================================================
   10. BOOT SEQUENCE — TRUSTED / UNTRUSTED
   ============================================================================ */
(async () => {
  console.log("[BOOT] MotionPage starting…");

  await prewarmMotionMembrane();

  const trust =
    typeof PulseSkinReflex.checkTrust === "function"
      ? await PulseSkinReflex.checkTrust()
      : true;

  if (!trust) {
    console.log("[BOOT] Untrusted session → OUTSIDE intent…");

    await BrainOrgan.freshEvolve({
      type: "portal:outside",
      payload: {
        mode: "outside",
        title: "Portal Boundary",
        message: "Please authenticate to continue."
      }
    });

    window.MotionPage = {
      evolve: (payload) =>
        CodeOrgan.evolve({ type: "portal:update", payload }),
      submit: Motion.submit,
      tick: Motion.tick,
      memory: MemoryOrgan,
      brain: BrainOrgan,
      router: RouterOrgan,
      binary: BinaryOrgan,
      impulse: ImpulseOrgan,
      icons: PulseIcons
    };

    return;
  }

  console.log("[BOOT] Trusted session → INSIDE intent…");

  const restored = await BrainOrgan.restore?.();
  if (!restored?.ok) {
    await BrainOrgan.freshEvolve({
      type: "page:inside",
      payload: {
        mode: "inside",
        title: "MotionPage",
        content: "Trusted session restored."
      }
    });
  }

  window.MotionPage = {
    evolve: (payload) =>
      CodeOrgan.evolve({ type: "page:update", payload }),
    route: (route, opts) => RouterOrgan.go(route, opts),
    submit: Motion.submit,
    tick: Motion.tick,
    prewarm: Motion.prewarm,
    evoTick: () => runMotionTick(),
    memory: MemoryOrgan,
    brain: BrainOrgan,
    router: RouterOrgan,
    binary: BinaryOrgan,
    impulse: ImpulseOrgan,
    icons: PulseIcons
  };

  console.log("[BOOT] MotionPage ready in INSIDE mode.");
})();
</script>

</body>
</html>
