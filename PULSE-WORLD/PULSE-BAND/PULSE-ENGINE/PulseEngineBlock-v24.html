<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!-- Viewport (unchanged but validated for v24) -->
  <meta name="viewport"
        content="width=device-width,
                 initial-scale=1,
                 maximum-scale=1,
                 minimum-scale=1,
                 user-scalable=no">

  <!-- ============================================================
       v24 IMMORTAL++ ENGINE IDENTITY
       ============================================================ -->
  <title>PulseEngineBlock — v24 IMMORTAL++</title>
  <meta name="pulse-engine-version" content="v24-IMMORTAL++">
  <meta name="pulse-schema-version" content="v2">
  <meta name="pulse-engine-role" content="engine_block">
  <meta name="pulse-trust-boundary" content="v24-IMMORTAL++">

  <!-- ============================================================
       v24 RUNTIME HINTS (used by SkinReflex + Compass + DB)
       ============================================================ -->
  <meta name="pulse-runtime-hints"
        content="dualBand,presenceAware,advantageAware,triHeartAware,sessionAware,chunkAware,idleAware,diagnosticsAware">

  <!-- ============================================================
       v24 PREWARM CACHE LAYER
       ============================================================ -->
  <meta name="pulse-prewarm-cache" content="enabled">

  <meta name="pulse-prewarm-band" content="dual">
  <meta name="pulse-prewarm-lane" content="auto">

  <!-- ============================================================
       PULSE UI SKIN ORGAN (BASE)
       ============================================================ -->
  <link rel="stylesheet" href="../_COMPONENTS_EVOLUTION/PulseEvolutionaryStyles.css" />

  <!-- ============================================================
       PULSE UI ANIMATION ORGAN (MOTION)
       ============================================================ -->
  <link rel="stylesheet" href="../_COMPONENTS_EVOLUTION/PulseEvolutionaryAnimations.css" />

  <!-- ============================================================
       v24 DYNAMIC CSS LAYERS
       ============================================================ -->
  <style id="evo-dynamic-style"></style>
  <style id="evo-dynamic-anim"></style>
  <style id="evo-dynamic-hints"></style>
</head>

<body>
  <!-- ============================================================
       HTML SKELETON (v24 IMMORTAL++)
       ============================================================ -->
  <div id="pulse-engine-block"></div>

  <!-- ============================================================
       JS LAYER (ENGINE BLOCK v24++)
       ============================================================ -->
  <script type="module">
/* ============================================================================
   AI_EXPERIENCE_META — PulseEngineBlock-v24-IMMORTAL++
   ----------------------------------------------------------------------------
   v24++ ENGINE BLOCK for the entire motion subsystem.
   • Still zero-compute / zero-mutation / pure bootstrap
   • Adds: chunked prewarm, idle-aware motion ticks, cache-aware membrane,
     hardened globals, richer diagnostics, and evolution-aware runtime hints.
   ============================================================================ */
const AI_EXPERIENCE_META = {
  identity: "PulseEngineBlock",
  version: "v24-IMMORTAL++",
  layer: "engine_block",
  role: "motion_engine_bootstrap",
  evo: {
    unifiedMotion: true,
    laneAgnostic: true,
    driftProof: true,
    zeroCompute: true,
    zeroMutation: true,
    pureBootstrap: true,
    presenceAware: true,
    advantageAware: true,
    triHeartAware: true,
    prewarmAware: true,
    idleAware: true,
    chunkAware: true,
    telemetryAware: true,
    diagnosticsAware: true,
    runtimeHintsAware: true
  }
};

const ENGINE_BLOCK_ROLE = Object.freeze({
  identity: "PulseEngineBlock-v24",
  schemaVersion: "v2",
  layer: "engine_block",
  stable: true
});

/* ============================================================================
   PAGE_INDEX — PulseEngineBlock-v24-IMMORTAL++
   ----------------------------------------------------------------------------
   PURPOSE:
     Root membrane for all motion lanes.
     Boots UI organism, loads PulseCompass IMMORTAL+, and exposes Motion API.

   RESPONSIBILITIES:
     • Load UI organs in correct IMMORTAL order
     • Load PulseCompass IMMORTAL+ (lane orchestrator)
     • Prewarm ALL organs (UI + Compass + lanes + DB) in CHUNKS
     • Handle trust boundary (INSIDE / OUTSIDE)
     • Expose Motion API + diagnostics to window.PulseEngineBlock
     • Schedule idle-aware background motion ticks

   FORBIDDEN:
     • No compute logic
     • No pattern expansion/compression
     • No shifter usage
     • No artery mutation
     • No direct engine manipulation

   NOTES:
     Must remain thin, deterministic, drift-proof, and append-only in behavior.
   ============================================================================ */

/* ============================================================================
   0. BOOT MEMBRANE — MUST BE FIRST
   ============================================================================ */
import * as PulseWindow from "../../PULSE-UI/_FRONTEND/PULSE-WORLD-PORTAL.js";

/* ============================================================================
   1. SKIN REFLEX — AUTO-ATTACHES
   ============================================================================ */
import * as PulseSkinReflex from "../../PULSE-UI/_FRONTEND/PulseUISkinReflex-v20.js";

/* ============================================================================
   2. ICONS
   ============================================================================ */
import { PulseIcons } from "../../PULSE-UI/_COMPONENTS_EVOLUTION/PulseEvolutionaryIcons-v20.js";

/* ============================================================================
   3. UI ORGANISM ORGANS
   ============================================================================ */
import { createPulseEvolutionaryCode } from "../../PULSE-UI/_COMPONENTS_EVOLUTION/PulseEvolutionaryCode.js";
import { createPulseEvolutionaryMemory } from "../../PULSE-UI/_COMPONENTS_EVOLUTION/PulseEvolutionaryMemory.js";
import { createPulseEvolutionaryBrain } from "../../PULSE-UI/_COMPONENTS_EVOLUTION/PulseEvolutionaryBrain.js";
import { createPulseEvolutionaryImpulse } from "../../PULSE-UI/_COMPONENTS_EVOLUTION/PulseEvolutionaryImpulse.js";
import { createPulseEvolutionaryRouter } from "../../PULSE-UI/_COMPONENTS_EVOLUTION/PulseEvolutionaryRouter.js";
import { createPulseEvolutionaryBinary } from "../../PULSE-UI/_COMPONENTS_EVOLUTION/PulseEvolutionaryBinary.js";

/* ============================================================================
   4. MOTION ORCHESTRATOR (PulseCompass IMMORTAL+)
   ============================================================================ */
import { createPulseCompass } from "./PulseCompass-v16.js";

/* ============================================================================
   5. MOCK CNS (replace with real CNS when wired)
   ============================================================================ */
const CNS = {
  emitImpulse(source, impulse) {
    console.log("[CNS] Impulse:", source, impulse);
  }
};

/* ============================================================================
   6. EVOLUTION MODEL (v24: cache-aware, runtime-hints)
   ============================================================================ */
const EvolutionCache = {
  lineage: null
};

const Evolution = {
  getPageLineage() {
    if (EvolutionCache.lineage) return EvolutionCache.lineage;
    const model = {
      lineage: "PulseEngineBlock-v24",
      stable: true,
      page: typeof window !== "undefined" ? window.location.pathname : "unknown",
      role: ENGINE_BLOCK_ROLE.identity,
      layer: ENGINE_BLOCK_ROLE.layer
    };
    EvolutionCache.lineage = model;
    return model;
  },
  recordPageLineage(model) {
    console.log("[Evolution] Lineage recorded:", model);
  }
};

/* ============================================================================
   7. INSTANTIATE UI ORGANS — IMMORTAL ORDER (v24)
   ============================================================================ */
const safePathname =
  typeof window !== "undefined" && window.location && window.location.pathname
    ? window.location.pathname
    : "PulseEngineBlock";

const MemoryOrgan = createPulseEvolutionaryMemory({
  routeId: safePathname
});

const CodeOrgan = createPulseEvolutionaryCode({
  Evolution,
  LongTermMemory: MemoryOrgan,
  CNS
});

const BrainOrgan = createPulseEvolutionaryBrain({
  Evolution,
  LongTermMemory: MemoryOrgan,
  CNS,
  createCode: () => CodeOrgan,
  createMemory: () => MemoryOrgan
});

const RouterOrgan = createPulseEvolutionaryRouter({
  CNS,
  Evolution,
  CodeOrgan,
  BrainOrgan
});

const ImpulseOrgan = createPulseEvolutionaryImpulse({
  CNS,
  Evolution,
  RouteOrgan: RouterOrgan
});

const BinaryOrgan = createPulseEvolutionaryBinary({
  Evolution,
  RouteOrgan: RouterOrgan,
  MemoryOrgan
});

/* ============================================================================
   8. CREATE MOTION ORCHESTRATOR (PulseCompass IMMORTAL+)
   ============================================================================ */
const Motion = createPulseCompass({
  MemoryOrgan,
  trace: false
});

/* ============================================================================
   9. FULL PREWARM — IMMORTAL++ (CHUNKED + GUARDED)
   ============================================================================ */
async function prewarmChunk(label, tasks = []) {
  if (!tasks.length) return;
  try {
    await Promise.allSettled(
      tasks.map((fn) => (typeof fn === "function" ? fn() : Promise.resolve()))
    );
    console.log(`[PREWARM] Chunk '${label}' complete.`);
  } catch (err) {
    console.warn(`[PREWARM] Chunk '${label}' failed:`, err);
  }
}

async function prewarmEngineBlock() {
  console.log("[PREWARM] PulseEngineBlock IMMORTAL++ prewarm starting…");

  // Chunk 1: memory + binary (foundation)
  await prewarmChunk("foundation", [
    () => MemoryOrgan.prewarm?.(),
    () => BinaryOrgan.prewarm?.()
  ]);

  // Chunk 2: brain + router (cortex)
  await prewarmChunk("cortex", [
    () => BrainOrgan.prewarm?.(),
    () => RouterOrgan.prewarm?.()
  ]);

  // Chunk 3: impulse + code (expression)
  await prewarmChunk("expression", [
    () => ImpulseOrgan.prewarm?.(),
    () => CodeOrgan.prewarm?.()
  ]);

  // Chunk 4: motion orchestrator (lanes + DB)
  await prewarmChunk("motion", [
    () => Motion.prewarm?.()
  ]);

  console.log("[PREWARM] PulseEngineBlock IMMORTAL++ membrane fully prewarmed.");
}

/* ============================================================================
   10. BACKGROUND MOTION TICK — IDLE / VISIBILITY AWARE
   ============================================================================ */
let motionTickTimer = null;
let motionTickIdleHandle = null;
let motionTickIntervalMs = 4000;

function runMotionTickOnce() {
  const res = Motion.tick?.();
  if (res?.metrics) {
    console.log("[ENGINEBLOCK-TICK]", res.metrics);
  }
}

function scheduleMotionTickIdle() {
  if (typeof window === "undefined") return;

  const idle = window.requestIdleCallback || ((cb) => setTimeout(cb, 50));

  motionTickIdleHandle = idle(() => {
    if (document.visibilityState === "visible") {
      runMotionTickOnce();
    }
  });
}

function startMotionTickLoop() {
  if (typeof window === "undefined") return;
  if (motionTickTimer) return;

  motionTickTimer = window.setInterval(() => {
    if (document.visibilityState !== "visible") return;
    scheduleMotionTickIdle();
  }, motionTickIntervalMs);
}

function stopMotionTickLoop() {
  if (typeof window === "undefined") return;
  if (motionTickTimer) {
    window.clearInterval(motionTickTimer);
    motionTickTimer = null;
  }
}

/* ============================================================================
   11. TRUST CACHE + BOUNDARY HELPERS
   ============================================================================ */
const TrustCache = {
  value: null,
  timestamp: null
};

async function resolveTrust() {
  if (TrustCache.value !== null) return TrustCache.value;

  const trust =
    typeof PulseSkinReflex.checkTrust === "function"
      ? await PulseSkinReflex.checkTrust()
      : true;

  TrustCache.value = !!trust;
  TrustCache.timestamp = Date.now();
  return TrustCache.value;
}

/* ============================================================================
   12. BOOT SEQUENCE — TRUSTED / UNTRUSTED
   ============================================================================ */
function buildOutsideAPI() {
  return Object.freeze({
    evolve: (payload) =>
      CodeOrgan.evolve({ type: "portal:update", payload }),
    submit: Motion.submit,
    tick: Motion.tick,
    prewarm: Motion.prewarm,
    memory: MemoryOrgan,
    brain: BrainOrgan,
    router: RouterOrgan,
    binary: BinaryOrgan,
    impulse: ImpulseOrgan,
    icons: PulseIcons,
    role: ENGINE_BLOCK_ROLE,
    meta: AI_EXPERIENCE_META
  });
}

function buildInsideAPI() {
  return Object.freeze({
    evolve: (payload) =>
      CodeOrgan.evolve({ type: "page:update", payload }),
    route: (route, opts) => RouterOrgan.go(route, opts),
    submit: Motion.submit,
    tick: Motion.tick,
    prewarm: Motion.prewarm,
    evoTick: () => runMotionTickOnce(),
    startMotionLoop: () => startMotionTickLoop(),
    stopMotionLoop: () => stopMotionTickLoop(),
    memory: MemoryOrgan,
    brain: BrainOrgan,
    router: RouterOrgan,
    binary: BinaryOrgan,
    impulse: ImpulseOrgan,
    icons: PulseIcons,
    role: ENGINE_BLOCK_ROLE,
    meta: AI_EXPERIENCE_META,
    getEvolutionLineage: () => Evolution.getPageLineage()
  });
}

(function attachVisibilityHooks() {
  if (typeof document === "undefined") return;
  document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") {
      startMotionTickLoop();
    } else {
      stopMotionTickLoop();
    }
  });
})();

/* ============================================================================
   13. MAIN BOOTSTRAP
   ============================================================================ */
(async () => {
  console.log("[BOOT] PulseEngineBlock-v24 starting…", ENGINE_BLOCK_ROLE);

  await prewarmEngineBlock();

  const trust = await resolveTrust();

  if (!trust) {
    console.log("[BOOT] Untrusted session → OUTSIDE intent…");

    await BrainOrgan.freshEvolve?.({
      type: "portal:outside",
      payload: {
        mode: "outside",
        title: "Portal Boundary",
        message: "Please authenticate to continue."
      }
    });

    if (typeof window !== "undefined") {
      window.PulseEngineBlock = buildOutsideAPI();
    }

    console.log("[BOOT] PulseEngineBlock ready in OUTSIDE mode.");
    return;
  }

  console.log("[BOOT] Trusted session → INSIDE intent…");

  const restored = await BrainOrgan.restore?.();
  if (!restored?.ok) {
    await BrainOrgan.freshEvolve?.({
      type: "page:inside",
      payload: {
        mode: "inside",
        title: "PulseEngineBlock",
        content: "Trusted session restored."
      }
    });
  }

  if (typeof window !== "undefined") {
    window.PulseEngineBlock = buildInsideAPI();
  }

  startMotionTickLoop();

  Evolution.recordPageLineage(Evolution.getPageLineage());

  console.log("[BOOT] PulseEngineBlock-v24 ready in INSIDE mode.");
})();
</script>


</body>
</html>
