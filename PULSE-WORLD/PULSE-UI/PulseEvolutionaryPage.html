<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width,
                 initial-scale=1,
                 maximum-scale=1,
                 minimum-scale=1,
                 user-scalable=no">

  <title>Pulse EvolutionaryTrustedPage — v13-EVO-PRIME</title>

  <!-- ============================================================================
       PULSE UI SKIN ORGAN (BASE)
       ============================================================================ -->
  <link rel="stylesheet" href="./PulseEvolutionaryStyles.css" />

  <!-- ============================================================================
       PULSE UI ANIMATION ORGAN (MOTION)
       ============================================================================ -->
  <link rel="stylesheet" href="./PulseEvolutionaryAnimations.css" />

  <!-- ============================================================================
       DYNAMIC CSS LAYER (EMPTY — JS will inject evolution rules)
       ============================================================================ -->
  <style id="evo-dynamic-style"></style>
</head>

<body>
  <!-- ============================================================================
       HTML LAYER (SKELETON)
       ----------------------------------------------------------------------------
       PulseEvolutionaryPage Skeleton
       --------------------------------
       This single wrapper can reconstruct into:
         • Any internal page (trusted intent)
         • The portal boundary (untrusted intent)
       The organism grows its own body dynamically.
       ============================================================================ -->
  <div id="evo-wrapper"></div>

  <!-- ============================================================================
       JS LAYER (CORTEX)
       ============================================================================ -->
  <script type="module">
    /* 0. BOOT MEMBRANE — MUST BE FIRST */
    import * as PulseWindow from "../PULSEEvolutionaryWindow.js";

    /* 1. SKIN REFLEX — SIDE‑EFFECT IMPORT, AUTO‑ATTACHES */
    import * as PULSEOSSkinReflex from "../PULSEOSSkinReflex.js"; // PageScannerV12 auto hooks window here

    function mark(label) {
      console.log("[INDEX]", label);
    }

    // Icons
    import { PulseIcons } from "./PulseEvolutionaryIcons.js";

    // UI organism organs
    import { createPulseEvolutionaryCode } from "./PulseEvolutionaryCode.js";
    import { createPulseEvolutionaryMemory } from "./PulseEvolutionaryMemory.js";
    import { createPulseEvolutionaryBrain } from "./PulseEvolutionaryBrain.js";
    import { createPulseEvolutionaryImpulse } from "./PulseEvolutionaryImpulse.js";
    import { createPulseEvolutionaryRouter } from "./PulseEvolutionaryRouter.js";
    import { createPulseEvolutionaryBinary } from "./PulseEvolutionaryBinary.js";

    // AI organs (example: aiEarn)
    import * as aiEarn from "../PULSE-AI/aiEarn.js";

    // Optional: evolution/earn helpers later can be wired here
    // import { createEvolutionEngine } from "../PULSE-AI/aiEvolutionEngine.js";
    // import { createEarnEngine } from "../PULSE-AI/aiEarnEngine.js";

    // Mock CNS (replace with real CNS when wired)
    const CNS = {
      emitImpulse(source, impulse) {
        console.log("[CNS] Impulse:", source, impulse);
      }
    };

    const Evolution = {
      getPageLineage() {
        return {
          lineage: "v13-evo-prime",
          stable: true,
          page: window.location.pathname
        };
      },
      recordPageLineage(model) {
        console.log("[Evolution] Lineage recorded:", model);
      }
    };

    // ------------------------------------------------------------------------
    // INSTANTIATE UI ORGANS — v13‑EVO‑PRIME wiring order
    // ------------------------------------------------------------------------

    // 1) Long‑term memory (route‑aware)
    const MemoryOrgan = createPulseEvolutionaryMemory({
      routeId: window.location.pathname || "PulseEvolutionaryPage"
    });

    // 2) Code organ (needs Evolution + Memory + CNS)
    const CodeOrgan = createPulseEvolutionaryCode({
      Evolution,
      LongTermMemory: MemoryOrgan,
      CNS
    });

    // 3) Brain organ (coordinates Code + Memory + CNS)
    const BrainOrgan = createPulseEvolutionaryBrain({
      Evolution,
      LongTermMemory: MemoryOrgan,
      CNS,
      createCode: () => CodeOrgan,
      createMemory: () => MemoryOrgan
    });

    // 4) Router organ (needs CNS + Evolution + Code + Brain)
    const RouterOrgan = createPulseEvolutionaryRouter({
      CNS,
      Evolution,
      CodeOrgan,
      BrainOrgan
    });

    // 5) Impulse organ (route‑aware, lineage‑aware)
    const ImpulseOrgan = createPulseEvolutionaryImpulse({
      CNS,
      Evolution,
      RouteOrgan: RouterOrgan
    });

    // 6) Binary organ (route‑aware, lineage‑aware, chunk/dechunk)
    const BinaryOrgan = createPulseEvolutionaryBinary({
      Evolution,
      RouteOrgan: RouterOrgan,
      MemoryOrgan
    });

    // ------------------------------------------------------------------------
    // PREWARM / PRE‑CHUNK — v13‑EVO‑PRIME
    // ------------------------------------------------------------------------
    async function prewarmEvolutionaryMembrane() {
      try {
        // Memory prewarm (route‑aware)
        if (typeof MemoryOrgan.prewarm === "function") {
          await MemoryOrgan.prewarm();
        }

        // Binary prewarm (chunk/dechunk paths)
        if (typeof BinaryOrgan.prewarm === "function") {
          await BinaryOrgan.prewarm();
        }

        // Brain prewarm (restore + minimal evolve)
        if (typeof BrainOrgan.prewarm === "function") {
          await BrainOrgan.prewarm();
        }

        console.log("[PREWARM] Evolutionary membrane prewarmed.");
      } catch (err) {
        console.warn("[PREWARM] Evolutionary membrane prewarm failed:", err);
      }
    }

    // ------------------------------------------------------------------------
    // BACKGROUND EVOLUTIONARY WORKER HOOK (for second page / loop)
    // ------------------------------------------------------------------------
    async function runBackgroundEvolutionaryTick() {
      // This is where, on the “worker” variant page,
      // you’d call big factoring functions, chunk/dechunk, etc.
      // Example (assuming BinaryOrgan exposes chunk/dechunk helpers):

      if (typeof BinaryOrgan.chunk === "function" &&
          typeof BinaryOrgan.dechunk === "function") {
        const sampleBits = BinaryOrgan.encode
          ? BinaryOrgan.encode({ intent: "evo-tick", ts: Date.now() })
          : "0";

        const chunks = BinaryOrgan.chunk(sampleBits);
        const recombined = BinaryOrgan.dechunk(chunks);

        // Optionally feed back into Code/Brain/Memory
        if (BinaryOrgan.decode) {
          const decoded = BinaryOrgan.decode(recombined);
          console.log("[EVOTICK] decoded payload:", decoded);
        }
      }

      // This function is intentionally minimal here;
      // the “worker” page can expand it into a 250‑line compute loop.
    }

    // ------------------------------------------------------------------------
    // BOOT SEQUENCE — EvolutionaryTrustedPage (TRUSTED / UNTRUSTED INTENTS)
    // ------------------------------------------------------------------------
    (async () => {
      console.log("[BOOT] PulseEvolutionaryPage starting…");

      await prewarmEvolutionaryMembrane();

      const trust =
        typeof PULSEOSSkinReflex.checkTrust === "function"
          ? await PULSEOSSkinReflex.checkTrust()
          : true; // default to trusted if not wired yet

      if (!trust) {
        console.log("[BOOT] Untrusted session → loading OUTSIDE intent…");

        await BrainOrgan.freshEvolve({
          type: "portal:outside",
          payload: {
            mode: "outside",
            title: "Portal Boundary",
            message: "Please authenticate to continue."
          }
        });

        // OUTSIDE mode: minimal interface, no internal routing
        window.PulseEvolutionaryPage = {
          evolve: (payload) =>
            CodeOrgan.evolve({ type: "portal:update", payload }),

          ai: async (intent) => {
            if (intent === "earn") {
              const data = await aiEarn.readAll?.();
              return CodeOrgan.evolve({
                type: "page:update",
                payload: {
                  mode: "inside",
                  title: "AI Earn Diagnostics",
                  content: JSON.stringify(data ?? {}, null, 2)
                }
              });
            }

            console.warn("[AI] Unknown AI intent:", intent);
          },

          memory: MemoryOrgan,
          brain: BrainOrgan,
          router: RouterOrgan,
          binary: BinaryOrgan,
          impulse: ImpulseOrgan,
          icons: PulseIcons
        };

        console.log("[BOOT] EvolutionaryTrustedPage ready in OUTSIDE mode.");
        return;
      }

      console.log("[BOOT] Trusted session → loading INSIDE intent…");

      const restored = await BrainOrgan.restore?.();

      if (!restored?.ok) {
        await BrainOrgan.freshEvolve({
          type: "page:inside",
          payload: {
            mode: "inside",
            title: "PulseOS",
            content: "Trusted session restored."
          }
        });
      }

      // INSIDE mode: full internal interface
      window.PulseEvolutionaryPage = {
        evolve: (payload) =>
          CodeOrgan.evolve({ type: "page:update", payload }),

        route: (route, opts) => RouterOrgan.go(route, opts),

        encode: (payload) => BinaryOrgan.encode?.(payload),
        decode: (compressed) => BinaryOrgan.decode?.(compressed),

        // Binary chunk/dechunk exposure for evo loops
        chunk: (bits) => BinaryOrgan.chunk?.(bits),
        dechunk: (chunks) => BinaryOrgan.dechunk?.(chunks),

        // Background evolutionary tick hook (for worker variant)
        evoTick: () => runBackgroundEvolutionaryTick(),

        memory: MemoryOrgan,
        brain: BrainOrgan,
        router: RouterOrgan,
        binary: BinaryOrgan,
        impulse: ImpulseOrgan,
        icons: PulseIcons
      };

      console.log("[BOOT] EvolutionaryTrustedPage ready in INSIDE mode.");
    })();
  </script>
</body>
</html>
