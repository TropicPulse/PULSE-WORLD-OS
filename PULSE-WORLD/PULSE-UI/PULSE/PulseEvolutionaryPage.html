<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width,
                 initial-scale=1,
                 maximum-scale=1,
                 minimum-scale=1,
                 user-scalable=no">

  <title>Pulse EvolutionaryTrustedPage — v16-Evo-IMMORTAL</title>

  <!-- 0. TOUCH — MUST LOAD FIRST -->
  <script type="module" src="../_CREATION_BARRIER/PULSE-TOUCH.js"></script>

  <!-- SKIN / MOTION -->
  <link rel="stylesheet" href="../_COMPONENTS_EVOLUTION/PulseEvolutionaryStyles.css" />
  <link rel="stylesheet" href="../_COMPONENTS_EVOLUTION/PulseEvolutionaryAnimations.css" />

  <!-- DYNAMIC CSS LAYER (EVOLUTION RULES) -->
  <style id="evo-dynamic-style"></style>
</head>

<body>
  <div id="evo-wrapper"></div>

  <!-- 1. PORTAL — MUST LOAD IMMEDIATELY AFTER TOUCH -->
  <script type="module" src="../_CREATION_BARRIER/PULSE-WORLD-PORTAL.js"></script>

  <!-- 2. EVO PAGE LOGIC — SAFE TO RUN AFTER PORTAL -->
  <script type="module">
    // ============================================================================
    // EVO PAGE — NOW RUNNING INSIDE A FULL MEMBRANE
    // ============================================================================

    import { PulseIcons } from "../_BACKEND/PulseEvolutionaryIcons.js";

    import { createPulseEvolutionaryCode } from "../_BACKEND/PulseEvolutionaryCode.js";
    import { createPulseEvolutionaryMemory } from "../_BACKEND/PulseEvolutionaryMemory.js";
    import { createPulseEvolutionaryBrain } from "../_BACKEND/PulseEvolutionaryBrain.js";
    import { createPulseEvolutionaryImpulse } from "../_BACKEND/PulseEvolutionaryImpulse.js";
    import { createPulseEvolutionaryRouter } from "../_BACKEND/PulseEvolutionaryRouter.js";
    import { createPulseEvolutionaryBinary } from "../_BACKEND/PulseEvolutionaryBinary.js";

    function mark(label, extra) {
      console.log("[EVO-PAGE]", label, extra || "");
    }

    mark("Membrane ready — running EvoPage logic");

    // Mock CNS (replace with real CNS when wired)
    const CNS = {
      emitImpulse(source, impulse) {
        console.log("[CNS] Impulse:", source, impulse);
      }
    };

    // ============================================================================
    // EVOLUTION CONTEXT / LINEAGE
    // ============================================================================
    const Evolution = {
      getPageLineage() {
        return {
          lineage: "v16-evo-immortal",
          stable: true,
          page: window.location.pathname
        };
      },
      recordPageLineage(model) {
        console.log("[Evolution] Lineage recorded:", model);
      }
    };

    // ============================================================================
    // ACTNOW — PURE REFLEX (KEEP USER IN PLACE AFTER SWAP)
    // ============================================================================
    function capturePageState() {
      return {
        scrollX: window.scrollX,
        scrollY: window.scrollY,
        anchor:
          document.activeElement &&
          (document.activeElement.id ||
            document.activeElement.name ||
            null)
      };
    }

    function actNowRestore(state) {
      if (!state) return;
      try {
        if (typeof window.scrollTo === "function") {
          window.scrollTo(state.scrollX || 0, state.scrollY || 0);
        }
        if (state.anchor) {
          const el =
            document.getElementById(state.anchor) ||
            document.getElementsByName(state.anchor)[0];
          if (el && typeof el.focus === "function") {
            el.focus();
          }
        }
      } catch {
        // ACTNOW must never break page
      }
    }

    // ============================================================================
    // INTENT / ROUTE ALIGNMENT — DRIFT-PROOF SHAPES
    // ============================================================================
    function alignEvolutionIntent(intent) {
      if (!intent || typeof intent !== "object") return intent;

      const base = {
        type: intent.type || "page:update",
        payload: intent.payload || {},
        __band: intent.payload?.__band || "symbolic",
        __dnaTag: intent.payload?.__dnaTag || null
      };

      return base;
    }

    function alignRouteIntent(route, opts) {
      const normalized = {
        route: route || "/",
        opts: opts || {}
      };

      normalized.opts.__band =
        typeof normalized.opts.__band === "string"
          ? normalized.opts.__band
          : "symbolic";

      return normalized;
    }

    // ============================================================================
    // INSTANTIATE UI ORGANS — v16-EVO-IMMORTAL wiring order
    // ============================================================================
    const routeId = window.location.pathname || "PulseEvolutionaryPage";

    // 1) Long‑term memory (route‑aware)
    const MemoryOrgan = createPulseEvolutionaryMemory({
      routeId
    });

    // 2) Code organ (needs Evolution + Memory + CNS)
    const CodeOrgan = createPulseEvolutionaryCode({
      Evolution,
      LongTermMemory: MemoryOrgan,
      CNS
    });

    // 3) Brain organ (coordinates Code + Memory + CNS)
    const BrainOrgan = createPulseEvolutionaryBrain({
      Evolution,
      LongTermMemory: MemoryOrgan,
      CNS,
      createCode: () => CodeOrgan,
      createMemory: () => MemoryOrgan
    });

    // 4) Router organ (needs CNS + Evolution + Code + Brain)
    const RouterOrgan = createPulseEvolutionaryRouter({
      CNS,
      Evolution,
      CodeOrgan,
      BrainOrgan
    });

    // 5) Impulse organ (route‑aware, lineage‑aware)
    const ImpulseOrgan = createPulseEvolutionaryImpulse({
      CNS,
      Evolution,
      RouteOrgan: RouterOrgan
    });

    // 6) Binary organ (route‑aware, lineage‑aware, encode/decode only)
    const BinaryOrgan = createPulseEvolutionaryBinary({
      Evolution,
      RouteOrgan: RouterOrgan,
      MemoryOrgan
    });

    // ============================================================================
    // PREWARM — POWER + UNDERSTANDING + EVO MEMBRANE
    // ============================================================================
    async function prewarmEvolutionaryMembrane() {
      try {
        // 1) Power prewarm (route + assets)
        try {
          if (PulsePowerAPI?.pulsePowerTouch) {
            PulsePowerAPI.pulsePowerTouch({
              pageId: routeId,
              route: routeId,
              assets: {
                images: [],
                fonts: [],
                scripts: [],
                styles: []
              },
              doc: document
            });
          }
        } catch (err) {
          console.warn("[PREWARM] PulsePower prewarm failed:", err);
        }

        // 2) Understanding prewarm (routes/pages)
        try {
          if (typeof prewarmUnderstandingLayer === "function") {
            await prewarmUnderstandingLayer({
              pages: [routeId],
              routes: [routeId],
              assets: []
            });
          }
        } catch (err) {
          console.warn("[PREWARM] Understanding prewarm failed:", err);
        }

        // 3) Memory prewarm (route‑aware)
        if (typeof MemoryOrgan.prewarm === "function") {
          await MemoryOrgan.prewarm();
        }

        // 4) Binary prewarm (encode/decode paths)
        if (typeof BinaryOrgan.prewarm === "function") {
          await BinaryOrgan.prewarm();
        }

        // 5) Brain prewarm (restore + minimal evolve)
        if (typeof BrainOrgan.prewarm === "function") {
          await BrainOrgan.prewarm();
        }

        console.log("[PREWARM] Evolutionary membrane prewarmed.");
      } catch (err) {
        console.warn("[PREWARM] Evolutionary membrane prewarm failed:", err);
      }
    }

    // ============================================================================
    // BOOT SEQUENCE — EvolutionaryTrustedPage (TRUSTED / UNTRUSTED INTENTS)
    // ============================================================================
    (async () => {
      console.log("[BOOT] PulseEvolutionaryPage starting…");

      await prewarmEvolutionaryMembrane();

      const PulseSkinReflex = window.PulseSkinReflex || {};
      const trust =
        typeof PulseSkinReflex.checkTrust === "function"
          ? await PulseSkinReflex.checkTrust()
          : true; // default to trusted if not wired yet

      if (!trust) {
        console.log("[BOOT] Untrusted session → loading OUTSIDE intent…");

        await BrainOrgan.freshEvolve({
          type: "portal:outside",
          payload: {
            mode: "outside",
            title: "Portal Boundary",
            message: "Please authenticate to continue."
          }
        });

        // OUTSIDE mode: minimal interface, no internal routing
        window.PulseEvolutionaryPage = {
          evolve: async (payload) => {
            const pre = capturePageState();

            const aligned = alignEvolutionIntent({
              type: "portal:update",
              payload
            });

            const result = await CodeOrgan.evolve(aligned);

            actNowRestore(pre);
            return result;
          },

          memory: MemoryOrgan,
          brain: BrainOrgan,
          router: RouterOrgan,
          binary: BinaryOrgan,
          impulse: ImpulseOrgan,
          icons: PulseIcons
        };

        console.log("[BOOT] EvolutionaryTrustedPage ready in OUTSIDE mode.");
        return;
      }

      console.log("[BOOT] Trusted session → loading INSIDE intent…");

      const restored = await BrainOrgan.restore?.();

      if (!restored?.ok) {
        await BrainOrgan.freshEvolve({
          type: "page:inside",
          payload: {
            mode: "inside",
            title: "PulseOS",
            content: "Trusted session restored."
          }
        });
      }

      // INSIDE mode: full internal interface
      window.PulseEvolutionaryPage = {
        evolve: async (payload) => {
          const pre = capturePageState();

          const aligned = alignEvolutionIntent({
            type: "page:update",
            payload
          });

          const result = await CodeOrgan.evolve(aligned);

          actNowRestore(pre);
          return result;
        },

        route: async (route, opts) => {
          const pre = capturePageState();

          const aligned = alignRouteIntent(route, opts);
          const result = await RouterOrgan.go(aligned.route, aligned.opts);

          actNowRestore(pre);
          return result;
        },

        // Encode/decode only — no frontend chunking
        encode: (payload) => BinaryOrgan.encode?.(payload),
        decode: (compressed) => BinaryOrgan.decode?.(compressed),

        memory: MemoryOrgan,
        brain: BrainOrgan,
        router: RouterOrgan,
        binary: BinaryOrgan,
        impulse: ImpulseOrgan,
        icons: PulseIcons
      };

      console.log("[BOOT] EvolutionaryTrustedPage ready in INSIDE mode.");
    })();
  </script>
</body>
</html>
