<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport"
      content="width=device-width,
               initial-scale=1,
               maximum-scale=1,
               minimum-scale=1,
               user-scalable=no">
               <title>SMS Redirect...</title>
</head>
<!-- Backend Connector Layer -->
<script type="module">
 
  const phone = new URLSearchParams(location.search).get("n");
  if (phone) {
    window.location.href = "sms:" + phone;
  } else {
    document.body.innerHTML = "Missing phone number.";
  }
</script>

</body>
</html>
